name: marketbridge_ng
description: "Hyper-Premium MarketBridge NG LTD Mobile Application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Routing
  provider: ^6.1.1
  go_router: ^13.1.0

  # Supabase (Database & Auth)
  supabase_flutter: ^2.3.4
  
  # Security Models
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # UI / UX Design
  google_fonts: ^6.1.0
  lucide_icons: ^0.1.2
  animate_do: ^3.3.3
  
  # Network & Utilities
  http: ^1.2.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  # Add asset declarations here later:
  # assets:
  #   - assets/images/
